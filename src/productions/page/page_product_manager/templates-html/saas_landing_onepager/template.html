<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Landing One-Pager Template</title>
  <style>
    body { margin: 0; background: #eef2f1; color: #12352b; font-family: "Noto Sans SC", system-ui, sans-serif; }
    .page { max-width: 1180px; margin: 0 auto; padding: 64px 32px; }
    nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 88px; font-weight: 900; }
    .hero { display: grid; grid-template-columns: .9fr 1.1fr; gap: 56px; align-items: center; }
    h1 { margin: 0 0 24px; font-size: 76px; line-height: 1; letter-spacing: 0; }
    p { color: #51605a; font-size: 20px; line-height: 1.8; }
    .button { display: inline-flex; border-radius: 999px; background: #12352b; color: #fafafa; padding: 16px 24px; font-weight: 900; }
    .panel { border: 1px solid rgba(18,53,43,.14); border-radius: 28px; background: rgba(255,255,255,.86); box-shadow: 0 26px 70px rgba(18,53,43,.13); padding: 28px; }
    .feature { border-radius: 18px; background: #f1f5ef; padding: 22px; margin-top: 14px; }
  </style>
</head>
<body>
  <main class="page">
    <nav><span>PRODUCT</span><span>Use cases · Access</span></nav>
    <section class="hero">
      <div><h1>这里放一句清楚的产品价值</h1><p>说明产品为谁解决什么问题，以及为什么现在值得使用。</p><a class="button">Primary CTA</a></div>
      <aside class="panel"><div class="feature">核心工作流 / 关键能力</div><div class="feature">证据、机制或使用场景</div><div class="feature">最后转化动作</div></aside>
    </section>
  </main>
</body>
</html>
