<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Launch Poster Template</title>
  <style>
    body { margin: 0; background: #101827; font-family: "Noto Sans SC", system-ui, sans-serif; }
    .poster { position: relative; overflow: hidden; width: min(100vw, 1080px); aspect-ratio: 4 / 5; margin: 0 auto; background: linear-gradient(160deg, #0b1220, #173552 54%, #f1ede2 54.5%, #fafafa); color: #fafafa; padding: 72px; }
    .brand { display: flex; justify-content: space-between; font-size: 24px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
    h1 { position: relative; z-index: 1; width: 7em; margin: 150px 0 0; font-size: 112px; line-height: .95; letter-spacing: 0; }
    .cta { position: absolute; left: 72px; bottom: 230px; border-radius: 999px; background: #ffd166; color: #0f172a; padding: 20px 28px; font-size: 24px; font-weight: 900; }
    .copy { position: absolute; right: 72px; bottom: 72px; width: 360px; color: #172033; font-size: 24px; line-height: 1.55; font-weight: 700; }
  </style>
</head>
<body>
  <main class="poster">
    <div class="brand"><span>Product</span><span>Date</span></div>
    <h1>这里放产品发布主标题</h1>
    <div class="cta">预约 / 了解更多</div>
    <p class="copy">这里放产品承诺、关键信息和行动理由。保持短，保证海报第一眼清楚。</p>
  </main>
</body>
</html>
