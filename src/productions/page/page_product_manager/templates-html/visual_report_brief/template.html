<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Report Brief Template</title>
  <style>
    body { margin: 0; background: #e8eaed; color: #1f2937; font-family: "Noto Sans SC", system-ui, sans-serif; }
    .report { max-width: 1180px; margin: 0 auto; padding: 64px 32px; background: #f7f7f4; }
    header { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: end; }
    h1 { max-width: 9em; margin: 0; font-size: 66px; line-height: 1; letter-spacing: 0; }
    .source { color: #64748b; font-size: 14px; font-weight: 900; text-transform: uppercase; text-align: right; }
    .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin: 32px 0; }
    .tile, .chart { border: 1px solid #e2e8f0; border-radius: 22px; background: #fafafa; padding: 22px; }
    .tile b { display: block; color: #0f766e; font-size: 38px; }
    .bars { display: flex; align-items: end; gap: 14px; height: 220px; border-left: 1px solid #cbd5e1; border-bottom: 1px solid #cbd5e1; padding-left: 16px; }
    .bar { flex: 1; border-radius: 10px 10px 0 0; background: linear-gradient(#0f766e, #7dd3fc); height: var(--h); }
  </style>
</head>
<body>
  <main class="report">
    <header><h1>这里放报告洞察标题</h1><div class="source">Source note<br>Period</div></header>
    <section class="tiles"><div class="tile"><b>42%</b><span>关键指标</span></div><div class="tile"><b>3.1x</b><span>趋势变化</span></div><div class="tile"><b>8</b><span>样本类别</span></div><div class="tile"><b>91%</b><span>完成度</span></div></section>
    <section class="chart"><h2>图表回答一个明确问题</h2><div class="bars"><div class="bar" style="--h:42%"></div><div class="bar" style="--h:58%"></div><div class="bar" style="--h:73%"></div><div class="bar" style="--h:86%"></div></div></section>
  </main>
</body>
</html>
