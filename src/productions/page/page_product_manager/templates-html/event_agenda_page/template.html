<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Agenda Page Template</title>
  <style>
    body { margin: 0; background: #eff1f6; color: #172554; font-family: "Noto Sans SC", system-ui, sans-serif; }
    .page { max-width: 1120px; margin: 0 auto; padding: 72px 32px; background: #f8fafc; }
    .hero { display: grid; grid-template-columns: 1fr 280px; gap: 32px; margin-bottom: 34px; }
    h1 { margin: 0; color: #1e3a8a; font-size: 76px; line-height: 1; letter-spacing: 0; }
    .info { align-self: end; border: 1px solid #dbeafe; border-radius: 22px; background: rgba(255,255,255,.76); padding: 22px; color: #1e3a8a; font-size: 22px; font-weight: 900; line-height: 1.65; }
    .agenda { display: grid; gap: 14px; }
    .row { display: grid; grid-template-columns: 110px 1fr 170px; gap: 18px; align-items: center; border: 1px solid #dbeafe; border-radius: 20px; background: rgba(255,255,255,.86); padding: 20px; }
    .time { color: #2563eb; font-size: 28px; font-weight: 900; }
    .speaker { border-radius: 999px; background: #dbeafe; color: #1e3a8a; padding: 10px 14px; font-size: 14px; font-weight: 900; text-align: center; }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero"><h1>这里放活动主题</h1><div class="info">日期<br>地点 / 线上<br>报名 CTA</div></section>
    <section class="agenda"><div class="row"><div class="time">19:30</div><div><strong>议程标题</strong><br>一句话说明本环节价值</div><div class="speaker">嘉宾</div></div><div class="row"><div class="time">20:05</div><div><strong>议程标题</strong><br>一句话说明本环节价值</div><div class="speaker">嘉宾</div></div></section>
  </main>
</body>
</html>
