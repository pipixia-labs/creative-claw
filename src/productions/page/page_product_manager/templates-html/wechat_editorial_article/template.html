<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeChat Editorial Article Template</title>
  <style>
    body { margin: 0; background: #f0e8da; color: #262626; font-family: "Noto Sans SC", system-ui, sans-serif; }
    article { max-width: 760px; margin: 0 auto; padding: 96px 32px; }
    .meta { display: flex; gap: 16px; color: #8a7f6c; font-size: 14px; letter-spacing: .06em; text-transform: uppercase; }
    h1 { max-width: 10em; margin: 24px 0 18px; font-family: "Noto Serif SC", serif; font-size: 64px; line-height: 1.05; letter-spacing: 0; }
    .deck { color: #5f574d; font-size: 20px; line-height: 1.9; }
    .rule { width: 72px; height: 2px; margin: 44px 0; background: #a2412c; }
    p { color: #3f3b34; font-size: 18px; line-height: 1.95; }
    blockquote { margin: 40px 0; border-left: 3px solid #a2412c; padding-left: 24px; color: #7a321f; font-family: "Noto Serif SC", serif; font-size: 28px; line-height: 1.45; }
  </style>
</head>
<body>
  <article>
    <div class="meta"><span>Editorial</span><span>Issue metadata</span></div>
    <h1>这里放公众号文章标题</h1>
    <p class="deck">这里放导语，用两到三句话建立阅读动机和文章主旨。</p>
    <div class="rule"></div>
    <p>正文段落保持舒展的行高和清晰的段间距。每个小节只推进一个观点。</p>
    <blockquote>这里放一条真正能推动叙事的金句或关键观点。</blockquote>
    <p>结尾给出总结、行动建议或品牌注脚，保持编辑感而不是营销堆叠。</p>
  </article>
</body>
</html>
