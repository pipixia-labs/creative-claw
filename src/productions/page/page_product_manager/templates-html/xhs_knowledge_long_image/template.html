<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xiaohongshu Knowledge Long Image Template</title>
  <style>
    body { margin: 0; background: #eee8dc; color: #24312d; font-family: "Noto Sans SC", system-ui, sans-serif; }
    .artboard { width: min(100%, 1080px); margin: 0 auto; background: #f8f2e8; padding: 72px; }
    .cover { border-radius: 36px; background: linear-gradient(135deg, #dcf4da, #fff3d4 52%, #ffd8ce); padding: 56px; }
    .eyebrow { display: inline-flex; border: 1px solid rgba(36,49,45,.16); border-radius: 999px; padding: 10px 16px; font-size: 24px; font-weight: 800; }
    h1 { max-width: 7em; margin: 32px 0 0; font-size: 76px; line-height: 1.04; letter-spacing: 0; }
    .sections { display: grid; gap: 24px; margin-top: 32px; }
    .section { display: grid; grid-template-columns: 72px 1fr; gap: 24px; border: 1px solid rgba(36,49,45,.1); border-radius: 28px; background: rgba(250,250,250,.72); padding: 28px; }
    .num { display: grid; place-items: center; width: 72px; height: 72px; border-radius: 24px; background: #2f6f5e; color: #fafafa; font-size: 30px; font-weight: 900; }
    h2 { margin: 0 0 10px; font-size: 34px; }
    p { margin: 0; color: #65746d; font-size: 24px; line-height: 1.65; }
  </style>
</head>
<body>
  <main class="artboard">
    <section class="cover">
      <div class="eyebrow">收藏向 · 主题标签</div>
      <h1>这里放一个具体、有收益感的标题</h1>
    </section>
    <section class="sections">
      <article class="section"><div class="num">1</div><div><h2>第一条关键建议</h2><p>用一句短说明解释为什么值得读者保存。</p></div></article>
      <article class="section"><div class="num">2</div><div><h2>第二条关键建议</h2><p>把步骤、清单或避坑点拆成手机截图可读的内容。</p></div></article>
      <article class="section"><div class="num">3</div><div><h2>最后给出可复用公式</h2><p>用总结增强收藏价值。</p></div></article>
    </section>
  </main>
</body>
</html>
