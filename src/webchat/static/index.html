<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>__CREATIVE_CLAW_TITLE__</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <section class="preview-panel" aria-label="Artifact preview">
        <div class="preview-tabs" role="tablist" aria-label="Preview type">
          <button id="tab-tldraw" class="preview-tab active" type="button" role="tab" aria-selected="true" aria-controls="preview-tldraw" data-preview-tab="tldraw">Image / Video</button>
          <button id="tab-html" class="preview-tab" type="button" role="tab" aria-selected="false" aria-controls="preview-html" data-preview-tab="html">Design</button>
          <button id="tab-ppt" class="preview-tab" type="button" role="tab" aria-selected="false" aria-controls="preview-ppt" data-preview-tab="ppt">PPT</button>
        </div>

        <div class="preview-body">
          <section id="preview-tldraw" class="preview-view active" role="tabpanel" aria-labelledby="tab-tldraw" data-preview-view="tldraw">
            <div id="tldraw-preview" class="tldraw-canvas">
              <div class="preview-empty">No media preview</div>
            </div>
          </section>

          <section id="preview-html" class="preview-view" role="tabpanel" aria-labelledby="tab-html" data-preview-view="html" hidden>
            <div id="html-preview" class="preview-slot">
              <div class="preview-empty">No Design preview</div>
            </div>
          </section>

          <section id="preview-ppt" class="preview-view" role="tabpanel" aria-labelledby="tab-ppt" data-preview-view="ppt" hidden>
            <div id="ppt-preview" class="preview-slot">
              <div class="preview-empty">No PPT preview</div>
            </div>
          </section>
        </div>
      </section>

      <main class="chat-panel">
        <div class="chat-topbar">
          <button id="session-history" class="session-history-button topbar-icon-button" type="button" aria-label="Show session history" title="Session history" aria-haspopup="dialog" aria-expanded="false">
            <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
              <path d="M12 8v5l3.2 1.9M5.7 6.4A8 8 0 1 1 4 11.3M4 4.5v4h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
          <button id="new-session" class="new-session-button" type="button" aria-label="Start new session" title="Start new session">+</button>
          <div id="session-popover" class="session-popover" role="dialog" aria-label="Session history" hidden>
            <div class="session-popover-header">
              <span>History</span>
            </div>
            <div id="session-list" class="session-list"></div>
          </div>
          <div class="status-line screen-reader-status">
            <span id="status-dot" class="status-dot" hidden></span>
            <span id="status">connecting</span>
          </div>
        </div>

        <section id="timeline" class="timeline"></section>

        <div class="composer-shell">
          <form id="composer" class="composer">
            <label class="composer-label" for="prompt">Message</label>
            <div id="attachment-list" class="attachment-list" aria-live="polite" hidden></div>
            <div class="composer-box">
              <textarea
                id="prompt"
                rows="1"
              ></textarea>
              <button id="attach-files" class="attach-button composer-icon-button" type="button" aria-label="Attach files" title="Attach files">
                <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                  <path d="M20.2 11.7 12 19.9a5.1 5.1 0 0 1-7.2-7.2l9.1-9.1a3.5 3.5 0 0 1 5 5l-9 9a1.9 1.9 0 0 1-2.7-2.7l8.2-8.2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
              <button id="send" class="send-button composer-icon-button" type="submit" data-state="idle" aria-label="Send message" title="Send message">
                <svg class="send-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                  <path d="M3.6 20.4 21 12 3.6 3.6l1.2 6.3L13 12l-8.2 2.1-1.2 6.3Z" fill="currentColor"></path>
                </svg>
                <svg class="stop-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                  <rect x="6" y="6" width="12" height="12" rx="1.5" fill="currentColor"></rect>
                </svg>
              </button>
              <input id="file-input" class="file-input" type="file" multiple>
            </div>
            <div class="composer-hint">Markdown is supported. Press Enter to send, Shift + Enter for a new line.</div>
          </form>
        </div>
      </main>
    </div>

    <template id="message-template">
      <article class="message-card">
        <div class="message-meta">
          <span class="message-role"></span>
        </div>
        <div class="message-body markdown"></div>
        <div class="artifact-grid"></div>
      </article>
    </template>

    <template id="progress-template">
      <article class="progress-card collapsed">
        <button class="progress-toggle" type="button" aria-expanded="false">
          <span class="progress-status" aria-hidden="true"></span>
          <span class="progress-copy">
            <span class="progress-badge">Activity</span>
            <span class="progress-title">Working</span>
            <span class="progress-summary">Preparing the request.</span>
          </span>
          <span class="progress-chevron" aria-hidden="true">⌄</span>
        </button>
        <div class="progress-body markdown"></div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
